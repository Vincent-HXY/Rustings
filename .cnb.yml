# CI: push 到 main 分支 或 提 PR 到 main 时自动评测 + 上传分数
main:
  push:
    - docker:
        image: docker.cnb.cool/learningos/oscamp-2026s/rustlings
      env:
        CARGO_TERM_COLOR: always
        TZ: Asia/Shanghai
      imports: https://cnb.cool/LearningOS/OSCamp-2026S/keys/-/blob/main/rustlings-secrets.yml
      stages:
        - name: Install jq
          script: apt-get update && apt-get install -y jq

        - name: Run tests
          script: cargo test --test cicv --verbose

        - name: Post score to OpenCamp
          script: |
            SCORE=$(jq -r '.statistics.total_succeeds' .ide/result/check_result.json)
            echo "Score: $SCORE / 100"
            curl -X POST "https://api.opencamp.cn/web/api/courseRank/createByThirdToken" \
              -H 'accept: application/json;charset=utf-8' \
              -H 'Content-Type: application/json' \
              -H "token: $RUSTLINGS_TOKEN" \
              -d "{\"channel\": \"cnb\", \"courseId\": $RUSTLINGS_COURSE_ID, \"ext\": \"{}\", \"name\": \"$CNB_BUILD_USER\", \"score\": $SCORE, \"totalScore\": 100}" \
              --fail --show-error

  pull_request.target:
    - docker:
        image: docker.cnb.cool/learningos/oscamp-2026s/rustlings
      env:
        CARGO_TERM_COLOR: always
        TZ: Asia/Shanghai
      imports: https://cnb.cool/LearningOS/OSCamp-2026S/keys/-/blob/main/rustlings-secrets.yml
      stages:
        - name: Fetch PR code
          script: |
            git remote add source ${CNB_WEB_ENDPOINT}/${CNB_PULL_REQUEST_SLUG}.git
            git fetch source $CNB_PULL_REQUEST_BRANCH
            git checkout -f $CNB_PULL_REQUEST_SHA

        - name: Install jq
          script: apt-get update && apt-get install -y jq

        - name: Run tests
          script: cargo test --test cicv --verbose

        - name: Post score to OpenCamp
          script: |
            SCORE=$(jq -r '.statistics.total_succeeds' .ide/result/check_result.json)
            echo "Score: $SCORE / 100"
            curl -X POST "https://api.opencamp.cn/web/api/courseRank/createByThirdToken" \
              -H 'accept: application/json;charset=utf-8' \
              -H 'Content-Type: application/json' \
              -H "token: $RUSTLINGS_TOKEN" \
              -d "{\"channel\": \"cnb\", \"courseId\": $RUSTLINGS_COURSE_ID, \"ext\": \"{}\", \"name\": \"$CNB_BUILD_USER\", \"score\": $SCORE, \"totalScore\": 100}" \
              --fail --show-error

# 云开发环境: 点击"云原生开发"按钮时启动
$:
  vscode:
    - runner:
        cpus: 16
      docker:
        image: docker.cnb.cool/learningos/oscamp-2026s/rustlings
      services:
        - vscode
        - docker
      stages:
        - name: Install rustlings
          script: cargo install --locked --path .
        - name: Start rustlings watch
          script: echo "Run 'rustlings watch' in terminal to start"
